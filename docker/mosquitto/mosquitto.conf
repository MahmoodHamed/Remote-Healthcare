# Mosquitto MQTT Broker Configuration
# -----------------------------------------
# Persistence
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Plain MQTT listener (local dev / internal Docker network)
listener 1883 0.0.0.0
protocol mqtt
# Allow anonymous on port 1883 for internal server communication
allow_anonymous true

# MQTT over WebSocket (for browser / debug clients)
listener 9001 0.0.0.0
protocol websockets
allow_anonymous true

# Uncomment and configure the following for TLS on port 8883 in production:
# listener 8883 0.0.0.0
# protocol mqtt
# allow_anonymous false
# password_file /mosquitto/config/passwd
# cafile   /mosquitto/config/certs/ca.crt
# certfile /mosquitto/config/certs/server.crt
# keyfile  /mosquitto/config/certs/server.key
# tls_version tlsv1.3
